name: Stale

on:
  schedule:
    - cron: "0 6 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in the last 30 days. It will be closed in 14 days if no further
            activity occurs. If this PR is still relevant, please leave a comment or push new commits.
          close-issue-message: "Closed due to inactivity. Feel free to reopen if this is still relevant."
          close-pr-message: "Closed due to inactivity. Feel free to reopen if this is still relevant."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
